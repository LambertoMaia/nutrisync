<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nutrilho — Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="nl-logo" viewBox="0 0 38 38">
    <rect width="38" height="38" rx="10" fill="#4a7c2f"/>
    <ellipse cx="19" cy="24" rx="10" ry="3.5" fill="none" stroke="#fff" stroke-width="1.8"/>
    <path d="M9 24 Q9 31 19 31 Q29 31 29 24" fill="rgba(255,255,255,.12)" stroke="#fff" stroke-width="1.8"/>
    <line x1="14" y1="9" x2="14" y2="20" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="12" y1="9" x2="12" y2="13" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="14" y1="9" x2="16" y2="13" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M22 7 C24 9 28 11 27 17 C25 15 21 13 22 7Z" fill="#a8d878"/>
    <line x1="22" y1="7" x2="25.5" y2="15" stroke="#fff" stroke-width=".9" stroke-linecap="round"/>
  </symbol>
</svg>

<div class="screen active" id="s-perfil">
  <nav class="topnav">
    <button class="btn-nav btn-ghost" onclick="go('s-home-user')" style="padding:8px 10px">← Voltar</button>
    <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700">Meu Perfil</div>
    <div style="width:70px"></div>
  </nav>
  <div class="scroll-body">
    <div style="background:linear-gradient(160deg,var(--green-l),var(--beige));padding:1.8rem 1.3rem;text-align:center;border-bottom:1px solid var(--beige-d)">
      <div class="avatar" style="width:60px;height:60px;font-size:24px;margin:0 auto .7rem">M</div>
      <div style="font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700">Maria Silva</div>
      <div style="font-size:12px;color:var(--text-l)">maria@email.com · (81) 99999-9999</div>
      <div style="display:flex;gap:5px;justify-content:center;margin-top:.7rem"><span class="chip">Emagrecer</span><span class="chip">Sem lactose</span></div>
    </div>
    <div class="section">
      <div class="card" style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.7rem">Resumo</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
          <div><div style="font-size:20px;font-weight:700;color:var(--green-d)">8</div><div style="font-size:11px;color:var(--text-l)">Pedidos</div></div>
          <div><div style="font-size:20px;font-weight:700;color:var(--green-d)">3</div><div style="font-size:11px;color:var(--text-l)">Cozinheiros</div></div>
          <div><div style="font-size:20px;font-weight:700;color:var(--green-d)">★4.8</div><div style="font-size:11px;color:var(--text-l)">Média rec.</div></div>
        </div>
      </div>
      <div class="card" style="cursor:pointer" onclick="go('s-pedidos')"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:500;font-size:14px">Meus pedidos</span><span style="color:var(--text-l)">→</span></div></div>
      <div class="card" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:500;font-size:14px">Editar perfil e restrições</span><span style="color:var(--text-l)">→</span></div></div>
      <div class="card" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:500;font-size:14px">Minhas receitas enviadas</span><span style="color:var(--text-l)">→</span></div></div>
      <button class="btn-secondary" style="width:100%;margin-top:.4rem" onclick="go('s-home')">Sair</button>
    </div>
  </div>
</div>

<button class="demo-fab" onclick="document.getElementById('dmenu').classList.toggle('open')">☰</button>
<div class="demo-panel" id="dmenu">
  <div class="demo-panel-hd">Navegar entre telas</div>
  <div class="demo-panel-body">
    <button class="dbtn" onclick="nav('s-home')">🏠 Landing page</button>
    <button class="dbtn" onclick="nav('s-cadastro')">📝 Cadastro</button>
    <button class="dbtn" onclick="nav('s-login')">🔑 Login</button>
    <button class="dbtn" onclick="nav('s-home-user')">👤 Home cliente</button>
    <button class="dbtn" onclick="nav('s-enviar-receita')">📷 Enviar receita</button>
    <button class="dbtn" onclick="nav('s-cozinheiros')">🔍 Marketplace</button>
    <button class="dbtn" onclick="nav('s-confirmar')">🛒 Confirmar pedido</button>
    <button class="dbtn" onclick="nav('s-status')">📦 Status do pedido</button>
    <button class="dbtn" onclick="nav('s-pedidos')">📋 Meus pedidos</button>
    <button class="dbtn" onclick="nav('s-avaliacao')">⭐ Avaliação</button>
    <button class="dbtn" onclick="nav('s-perfil')">👤 Perfil</button>
    <button class="dbtn" onclick="nav('s-sem-receita')">🥗 Cardápios sugeridos</button>
    <button class="dbtn" onclick="nav('s-painel-cook')">👨‍🍳 Painel cozinheiro</button>
  </div>
</div>

<script src="scripts.js"></script>
</body>
</html>
